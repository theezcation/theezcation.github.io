name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Finalize
        env:
          A5526A: ${{ secrets.A5526A }}
          B5B4EB: ${{ secrets.B5B4EB }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A5526A', '')
          bm = os.environ.get('B5B4EB', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s.replace('<!-- dcc0f69579bff65b5742cf7ac31dfe10ca9ea4f6c7bd16 -->', gm)
              s2 = s2.replace('<!-- 7bf772b3533c2aad9fa80227fe1f9f97538d1cd7ac29 -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0:
              sys.exit(1)
          "
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
